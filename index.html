<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Goated Sanctum</title>
    <style>
        /* === THEME & VARIABLES === */
        :root {
            --bg-base: #09090b;
            --bg-panel: #18181b;
            --bg-elevated: #27272a;
            --accent-gold: #fbbf24;
            --accent-gold-glow: rgba(251, 191, 36, 0.3);
            --accent-danger: #ef4444;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --font-display: 'Cinzel', 'Georgia', serif;
            --font-body: 'Inter', system-ui, sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #27272a 0%, transparent 50%);
        }

        /* === TYPOGRAPHY & HEADER === */
        header {
            text-align: center;
            padding: 4rem 1rem 2rem;
            position: relative;
        }

        .dramatic-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(to bottom, #fffbeb, #fbbf24, #b45309);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--accent-gold-glow));
            margin-bottom: 1rem;
            animation: pulseGlow 4s infinite alternate;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* === DASHBOARD & CONTROLS === */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            background: var(--bg-panel);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--bg-elevated);
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn {
            background: var(--bg-elevated);
            color: var(--text-main);
            border: 1px solid #3f3f46;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover { background: #3f3f46; transform: translateY(-2px); }
        .btn-gold { background: var(--accent-gold); color: #000; border: none; }
        .btn-gold:hover { background: #f59e0b; box-shadow: 0 0 15px var(--accent-gold-glow); }
        .btn-danger { background: transparent; color: var(--accent-danger); border-color: var(--accent-danger); }
        .btn-danger:hover { background: var(--accent-danger); color: white; }

        select.btn { appearance: none; padding-right: 2.5rem; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 0.7rem top 50%; background-size: 0.65rem auto; }

        .stats-bar {
            display: flex;
            gap: 1.5rem;
            color: var(--accent-gold);
            font-family: var(--font-display);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .auth-hidden { display: none !important; }

        /* === GRID & CARDS === */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            padding-bottom: 4rem;
        }

        .card {
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid var(--bg-elevated);
            overflow: hidden;
            position: relative;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 20px var(--accent-gold-glow);
        }

        .card-image-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .card-image {
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) brightness(0.4);
            transition: var(--transition);
        }

        .card:hover .card-image {
            filter: grayscale(0%) brightness(0.6);
            transform: scale(1.05);
        }

        .card-gradient {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 80%;
            background: linear-gradient(to top, var(--bg-base) 0%, rgba(9,9,11,0.8) 50%, transparent 100%);
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
            padding: 2rem;
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .quote-icon {
            color: var(--accent-gold);
            font-size: 3rem;
            font-family: var(--font-display);
            line-height: 0;
            opacity: 0.5;
        }

        .quote-text {
            font-size: 1.3rem;
            font-style: italic;
            line-height: 1.5;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .quote-author {
            color: var(--accent-gold);
            font-family: var(--font-display);
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .goat-meter {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            background: rgba(0,0,0,0.5);
            padding: 0.8rem;
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }

        .stars { display: flex; gap: 5px; font-size: 1.5rem; cursor: default; }
        .stars.interactive { cursor: pointer; }
        .star { filter: grayscale(100%) opacity(0.3); transition: var(--transition); }
        .star.active { filter: grayscale(0%) opacity(1); transform: scale(1.1); }
        .star:hover.interactive { transform: scale(1.3); }

        .goat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-actions {
            position: absolute;
            top: 1rem; right: 1rem;
            z-index: 3;
            display: flex;
            gap: 0.5rem;
        }

        .card-actions button {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--text-muted);
            color: white;
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: var(--transition);
        }

        .card-actions button:hover { background: var(--bg-elevated); transform: scale(1.1); }
        .card-actions .del:hover { background: var(--accent-danger); border-color: var(--accent-danger); }

        /* === MODALS === */
        .modal-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }

        .modal-backdrop.open { opacity: 1; pointer-events: auto; }

        .modal {
            background: var(--bg-panel);
            border: 1px solid var(--accent-gold);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 40px rgba(251, 191, 36, 0.1);
            transform: scale(0.9);
            transition: var(--transition);
        }

        .modal-backdrop.open .modal { transform: scale(1); }

        .modal h2 {
            font-family: var(--font-display);
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
            font-size: 2rem;
            text-align: center;
        }

        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 1rem;
            background: var(--bg-base);
            border: 1px solid var(--bg-elevated);
            color: white;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        .input-group input:focus, .input-group textarea:focus { outline: none; border-color: var(--accent-gold); }
        .input-group textarea { resize: vertical; min-height: 120px; }

        .modal-buttons { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; }

        /* Animations */
        @keyframes pulseGlow {
            from { filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.2)); }
            to { filter: drop-shadow(0 0 25px rgba(251, 191, 36, 0.6)); }
        }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="dramatic-title">The Goated Sanctum</h1>
        <p class="subtitle">Immortalizing the profound, the stupid, and the legendary.</p>
    </header>

    <main class="dashboard">
        <div class="toolbar">
            <div class="stats-bar" id="statsBar">
                <!-- Stats injected by JS -->
            </div>
            
            <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                <select class="btn" id="sortSelect" onchange="renderQuotes()">
                    <option value="goated">Rank: Absolute Goats First</option>
                    <option value="trash">Rank: Literal Trash First</option>
                    <option value="newest">Timeline: Newest Entry</option>
                    <option value="oldest">Timeline: Oldest Entry</option>
                </select>

                <!-- Guest Controls -->
                <button class="btn btn-gold guest-only" onclick="openModal('loginModal')">🔑 Enter The Vault (Admin)</button>

                <!-- Admin Controls -->
                <button class="btn btn-gold auth-only auth-hidden" onclick="openModal('quoteModal')">✍️ Scribe a Quote</button>
                <button class="btn auth-only auth-hidden" onclick="openModal('settingsModal')">⚙️ Vault Settings</button>
                <button class="btn btn-danger auth-only auth-hidden" onclick="logout()">🚪 Lock Vault</button>
            </div>
        </div>

        <div class="grid" id="quoteGrid">
            <!-- Quotes injected by JS -->
        </div>
    </main>

    <!-- Modal: Login -->
    <div class="modal-backdrop" id="loginModal">
        <div class="modal">
            <h2>Access Sanctum</h2>
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Sanctum ID</label>
                    <input type="text" id="loginId" required placeholder="admin">
                </div>
                <div class="input-group">
                    <label>Secret Passphrase</label>
                    <input type="password" id="loginPass" required placeholder="password123">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn" onclick="closeModals()">Flee</button>
                    <button type="submit" class="btn btn-gold">Unlock</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Add/Edit Quote -->
    <div class="modal-backdrop" id="quoteModal">
        <div class="modal">
            <h2 id="quoteModalTitle">Scribe New Lore</h2>
            <form onsubmit="handleQuoteSubmit(event)">
                <input type="hidden" id="qId">
                <div class="input-group">
                    <label>The Words Uttered</label>
                    <textarea id="qText" required placeholder="What was said?"></textarea>
                </div>
                <div class="input-group">
                    <label>The Sayer (Author)</label>
                    <input type="text" id="qAuthor" required placeholder="Who said it?">
                </div>
                <div class="input-group">
                    <label>Portrait Archive Path</label>
                    <input type="text" id="qImage" value="images/hero.png" required>
                </div>
                <div class="input-group">
                    <label>Initial Goat Rating (1-5)</label>
                    <input type="number" id="qRating" min="1" max="5" value="3" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn" onclick="closeModals()">Discard</button>
                    <button type="submit" class="btn btn-gold">Immortalize</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Settings -->
    <div class="modal-backdrop" id="settingsModal">
        <div class="modal">
            <h2>Vault Configurations</h2>
            <form onsubmit="handleChangeCredentials(event)">
                <div class="input-group">
                    <label>New Sanctum ID</label>
                    <input type="text" id="newId" required>
                </div>
                <div class="input-group">
                    <label>New Passphrase</label>
                    <input type="password" id="newPass" required>
                </div>
                <div class="modal-buttons" style="justify-content: space-between; border-bottom: 1px solid #3f3f46; padding-bottom: 1.5rem; margin-bottom: 1.5rem;">
                    <button type="submit" class="btn btn-gold">Update Credentials</button>
                </div>
            </form>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <label style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase;">Data Management</label>
                <button class="btn" onclick="exportData()">💾 Backup Grimoire (Export JSON)</button>
                <button class="btn btn-danger" onclick="factoryReset()">🔥 Burn It All (Reset Data)</button>
                <button class="btn" onclick="closeModals()" style="align-self: flex-end; margin-top: 1rem;">Done</button>
            </div>
        </div>
    </div>

    <script>
        // === CORE STATE & LOCALSTORAGE ===
        const STORAGE_KEY = 'TheGoatedSanctumData';
        
        let state = {
            isLoggedIn: false,
            credentials: { id: 'admin', pass: 'password123' },
            quotes: [
                { id: 1, text: "I'm not saying I'm Batman, I'm just saying nobody has ever seen me and Batman in the same room together.", author: "Dave", image: "images/hero.png", rating: 5, date: 1700000000000 },
                { id: 2, text: "Bro, if you think about it, a hotdog is technically a taco.", author: "Sleep-Deprived Alex", image: "images/hero.png", rating: 2, date: 1700000001000 },
                { id: 3, text: "The code is compiling. Do not look at it, do not breathe on it.", author: "Senior Dev", image: "images/hero.png", rating: 4, date: 1700000002000 }
            ]
        };

        // Funny labels for the stars
        const GOAT_LABELS = {
            1: "🗑️ Literal Trash",
            2: "🥱 Absolutely Mid",
            3: "🤔 Respectable Take",
            4: "🔥 Highly Based",
            5: "🐐 DIVINE GOAT"
        };

        // Initialize App
        function init() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                const parsed = JSON.parse(savedData);
                state.credentials = parsed.credentials || state.credentials;
                state.quotes = parsed.quotes || state.quotes;
            }
            saveData();
            updateUI();
        }

        function saveData() {
            // We don't save isLoggedIn state so it resets on refresh (security feature)
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                credentials: state.credentials,
                quotes: state.quotes
            }));
            updateStats();
        }

        // === AUTHENTICATION ===
        function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('loginId').value;
            const pass = document.getElementById('loginPass').value;

            if (id === state.credentials.id && pass === state.credentials.pass) {
                state.isLoggedIn = true;
                closeModals();
                updateUI();
                document.getElementById('loginPass').value = ''; // clear pass
                
                // Add a cool dramatic effect on login
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 500);
            } else {
                alert("❌ The Vault rejects your credentials. Try again.");
            }
        }

        function logout() {
            state.isLoggedIn = false;
            updateUI();
        }

        function handleChangeCredentials(e) {
            e.preventDefault();
            const newId = document.getElementById('newId').value;
            const newPass = document.getElementById('newPass').value;
            
            if(confirm("Are you sure you want to change the Vault's locks? Don't forget these!")) {
                state.credentials.id = newId;
                state.credentials.pass = newPass;
                saveData();
                alert("✅ Credentials updated successfully.");
            }
        }

        // === RENDER LOGIC ===
        function updateUI() {
            // Toggle visibility classes based on auth
            const authEls = document.querySelectorAll('.auth-only');
            const guestEls = document.querySelectorAll('.guest-only');
            
            authEls.forEach(el => state.isLoggedIn ? el.classList.remove('auth-hidden') : el.classList.add('auth-hidden'));
            guestEls.forEach(el => state.isLoggedIn ? el.classList.add('auth-hidden') : el.classList.remove('auth-hidden'));

            renderQuotes();
        }

        function updateStats() {
            const total = state.quotes.length;
            const goatedCount = state.quotes.filter(q => q.rating === 5).length;
            document.getElementById('statsBar').innerHTML = `
                <span>📜 Archives: ${total}</span>
                <span>🐐 Divine Quotes: ${goatedCount}</span>
            `;
        }

        function renderQuotes() {
            const grid = document.getElementById('quoteGrid');
            const sortType = document.getElementById('sortSelect').value;
            
            let sorted = [...state.quotes];
            if (sortType === 'goated') sorted.sort((a, b) => b.rating - a.rating);
            if (sortType === 'trash') sorted.sort((a, b) => a.rating - b.rating);
            if (sortType === 'newest') sorted.sort((a, b) => b.date - a.date);
            if (sortType === 'oldest') sorted.sort((a, b) => a.date - b.date);

            grid.innerHTML = '';

            sorted.forEach((quote) => {
                let starsHTML = '';
                // Map the array to visual emojis. 1-5 scale.
                const starEmojis = ['💩', '🥉', '🥈', '🥇', '🐐'];
                
                for (let i = 1; i <= 5; i++) {
                    const isActive = i <= quote.rating ? 'active' : '';
                    const interactClass = state.isLoggedIn ? 'interactive' : '';
                    const clickAction = state.isLoggedIn ? `onclick="rateQuote(${quote.id}, ${i})"` : '';
                    // Use a generic star for unearned, and specific emoji for earned
                    const displayChar = isActive ? starEmojis[i-1] : '⭐';
                    
                    starsHTML += `<span class="star ${isActive} ${interactClass}" ${clickAction}>${displayChar}</span>`;
                }

                const actionsHTML = state.isLoggedIn ? `
                    <div class="card-actions">
                        <button onclick="editQuote(${quote.id})">✏️</button>
                        <button class="del" onclick="deleteQuote(${quote.id})">🗑️</button>
                    </div>
                ` : '';

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-image-wrapper">
                        <div class="card-image" style="background-image: url('${quote.image}')"></div>
                    </div>
                    <div class="card-gradient"></div>
                    ${actionsHTML}
                    <div class="card-content">
                        <div class="quote-icon">"</div>
                        <div class="quote-text">${quote.text}</div>
                        <div class="quote-author">— ${quote.author}</div>
                        <div class="goat-meter">
                            <div class="stars">${starsHTML}</div>
                            <div class="goat-label">${GOAT_LABELS[quote.rating]}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // === CRUD OPERATIONS ===
        function handleQuoteSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('qId').value;
            const text = document.getElementById('qText').value;
            const author = document.getElementById('qAuthor').value;
            const image = document.getElementById('qImage').value;
            const rating = parseInt(document.getElementById('qRating').value);

            if (id) {
                // Edit existing
                const index = state.quotes.findIndex(q => q.id == id);
                state.quotes[index] = { ...state.quotes[index], text, author, image, rating };
            } else {
                // Add new
                const newId = state.quotes.length > 0 ? Math.max(...state.quotes.map(q => q.id)) + 1 : 1;
                state.quotes.push({ id: newId, text, author, image, rating, date: Date.now() });
                
                // Comedic effect for new 5 star
                if(rating === 5) {
                    document.body.classList.add('shake');
                    setTimeout(() => document.body.classList.remove('shake'), 600);
                }
            }

            saveData();
            closeModals();
            renderQuotes();
        }

        function editQuote(id) {
            const q = state.quotes.find(q => q.id === id);
            document.getElementById('quoteModalTitle').innerText = 'Rewrite History';
            document.getElementById('qId').value = q.id;
            document.getElementById('qText').value = q.text;
            document.getElementById('qAuthor').value = q.author;
            document.getElementById('qImage').value = q.image;
            document.getElementById('qRating').value = q.rating;
            openModal('quoteModal');
        }

        function deleteQuote(id) {
            if(confirm("Are you sure you want to erase this from the annals of history forever?")) {
                state.quotes = state.quotes.filter(q => q.id !== id);
                saveData();
                renderQuotes();
            }
        }

        function rateQuote(id, rating) {
            if (!state.isLoggedIn) return;
            const index = state.quotes.findIndex(q => q.id === id);
            if (index > -1) {
                state.quotes[index].rating = rating;
                saveData();
                renderQuotes();
                
                if(rating === 5) {
                    document.body.classList.add('shake');
                    setTimeout(() => document.body.classList.remove('shake'), 400);
                }
            }
        }

        // === MODAL CONTROLS ===
        function openModal(modalId) {
            // Reset forms if opening add quote
            if (modalId === 'quoteModal' && !document.getElementById('qId').value) {
                document.getElementById('quoteModalTitle').innerText = 'Scribe New Lore';
                document.getElementById('qId').value = '';
                document.getElementById('qText').value = '';
                document.getElementById('qAuthor').value = '';
                document.getElementById('qImage').value = 'images/hero.png';
                document.getElementById('qRating').value = '3';
            }
            
            // Populate settings modal
            if (modalId === 'settingsModal') {
                document.getElementById('newId').value = state.credentials.id;
                document.getElementById('newPass').value = state.credentials.pass;
            }

            document.getElementById(modalId).classList.add('open');
        }

        function closeModals() {
            document.querySelectorAll('.modal-backdrop').forEach(m => m.classList.remove('open'));
            document.getElementById('qId').value = ''; // reset hidden id
        }

        // Close modal on outside click
        window.onclick = function(event) {
            if (event.target.classList.contains('modal-backdrop')) closeModals();
        }

        // === DATA MANAGEMENT ===
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href",     dataStr);
            downloadAnchorNode.setAttribute("download", "goated_grimoire_backup.json");
            document.body.appendChild(downloadAnchorNode); // required for firefox
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function factoryReset() {
            if(confirm("🚨 WARNING! 🚨\nThis will wipe all quotes and reset passwords to default. Are you entirely sure?")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload(); // Quickest way to reset state to defaults
            }
        }

        // Boot up
        init();
    </script>
</body>
</html>
